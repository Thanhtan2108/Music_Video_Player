<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trang nghe nhạc video trực tuyến — phát liên tục từ YouTube" />
  <title>MusicPlay — Nghe Nhạc Video</title>
  <link rel="icon" type="image/svg+xml" href="./assets/images/logo.svg" />
  <link rel="icon" type="image/png" href="./assets/images/logo.png" />
  <link rel="stylesheet" href="./css/main.css" />
</head>

<body>

  <!-- =============================================
   * HEADER — sticky, chứa logo + search + controls
   * ============================================= -->
  <header class="site-header" id="site-header">

    <!-- Logo -->
    <div class="header__logo">
      <span class="header__logo-icon">♪</span>
      <span class="header__logo-text">MusicPlay</span>
    </div>

    <!-- Search -->
    <div class="header__search-wrapper">
      <form class="search-bar" id="search-form" role="search">
        <input
          class="search-bar__input"
          id="search-input"
          type="search"
          placeholder="Tìm bài hát, ca sĩ..."
          autocomplete="off"
          aria-label="Tìm kiếm bài hát"
        />
        <button class="search-bar__btn" id="search-btn" type="submit" aria-label="Tìm kiếm">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
      </form>
    </div>

    <!-- Player Controls -->
    <nav class="player-controls" id="player-controls" aria-label="Điều khiển phát nhạc">
      <button class="control-btn" id="btn-go-to-start" type="button" title="Về đầu danh sách" aria-label="Về đầu danh sách">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polygon points="19 20 9 12 19 4 19 20" />
          <line x1="5" y1="19" x2="5" y2="5" />
        </svg>
      </button>

      <button class="control-btn" id="btn-previous" type="button" title="Video trước" aria-label="Phát video trước">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polygon points="19 20 9 12 19 4 19 20" />
          <line x1="5" y1="19" x2="5" y2="5" />
        </svg>
      </button>

      <button class="control-btn control-btn--primary" id="btn-pause-play" type="button"
        title="Tạm dừng / Phát" aria-label="Tạm dừng hoặc phát video" data-state="playing">
        <svg class="icon icon--pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="6" y="4" width="4" height="16" />
          <rect x="14" y="4" width="4" height="16" />
        </svg>
        <svg class="icon icon--play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
      </button>

      <button class="control-btn" id="btn-next" type="button" title="Video tiếp theo" aria-label="Phát video tiếp theo">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polygon points="5 4 15 12 5 20 5 4" />
          <line x1="19" y1="5" x2="19" y2="19" />
        </svg>
      </button>
    </nav>

  </header>


  <!-- =============================================
   * PLAYER BAR — vùng phát video cố định, luôn hiển thị
   * Ẩn mặc định, hiện khi có video được chọn
   * ============================================= -->
  <div class="player-bar" id="player-bar" hidden>
    <div class="player-bar__inner">

      <!-- YouTube API tự tạo iframe bên trong div này -->
      <div class="player-bar__video-wrapper">
        <div id="main-youtube-player"></div>
      </div>

      <!-- Thông tin bài đang phát -->
      <div class="player-bar__info">
        <p class="player-bar__title"  id="player-bar-title">—</p>
        <p class="player-bar__artist" id="player-bar-artist">—</p>
      </div>

    </div>
  </div>


  <!-- =============================================
   * MAIN — danh sách playlist và video
   * ============================================= -->
  <main class="site-main" id="site-main">

    <!-- Kết quả tìm kiếm — ẩn mặc định -->
    <section class="search-results" id="search-results" aria-live="polite" aria-label="Kết quả tìm kiếm" hidden>
      <div class="search-results__header">
        <h2 class="search-results__title">
          Kết quả tìm kiếm: <span id="search-results-keyword"></span>
        </h2>
        <button class="search-results__close-btn" id="btn-close-search" type="button" aria-label="Đóng kết quả tìm kiếm">
          Đóng ✕
        </button>
      </div>
      <div class="video-grid" id="search-results-grid"></div>
    </section>

    <!-- Danh sách playlist — JS render vào đây -->
    <div class="playlist-list" id="playlist-list"></div>

  </main>


  <!-- =============================================
   * FOOTER
   * ============================================= -->
  <footer class="site-footer" id="site-footer">
    <p class="site-footer__text">
      © <span id="footer-year"></span> MusicPlay — Nội dung từ YouTube
    </p>
  </footer>

  <script type="module" src="./js/main.js"></script>

</body>
</html>
