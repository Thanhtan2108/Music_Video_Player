<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Nền hình tròn -->
  <circle cx="32" cy="32" r="32" fill="#0a0a0f"/>

  <!-- Vòng ngoài trang trí -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4"/>

  <!-- Nốt nhạc kép — nốt đầu tiên -->
  <ellipse cx="22" cy="44" rx="7" ry="5" fill="#ffaa00" transform="rotate(-15 22 44)"/>
  <line x1="28.5" y1="42" x2="28.5" y2="20" stroke="#ffaa00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nốt nhạc kép — nốt thứ hai -->
  <ellipse cx="38" cy="40" rx="7" ry="5" fill="#ffaa00" transform="rotate(-15 38 40)"/>
  <line x1="44.5" y1="38" x2="44.5" y2="16" stroke="#ffaa00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Gạch nối hai nốt (beam) -->
  <rect x="28.5" y="18.5" width="16" height="3.5" rx="1.75" fill="#ffaa00"/>

</svg>
